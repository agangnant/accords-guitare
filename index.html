<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <!-- La nouvelle balise viewport optimisée -->
  <meta name="viewport" content="width=device-width, initial-scale=0.95">

  <title>Visualiseur d'Accords</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- ... le reste de votre head reste identique ... -->
  <meta name="theme-color" content="#333333"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Accords">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker enregistré avec succès: ', registration.scope);
        }, err => {
          console.log('Échec de l\'enregistrement du ServiceWorker: ', err);
        });
      });
    }
  </script>
</head>

<body>
<div class="container">
<h1>Accords guitare</h1>

<div class="controls">
<select id="chord">
  <option value="">— Accord —</option>

<optgroup label="Accords Majeurs">
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="A">A</option>
<option value="B">B</option>
</optgroup>

<optgroup label="Accords Mineurs">
<option value="Cm">Cm</option>
<option value="Dm">Dm</option>
<option value="Em">Em</option>
<option value="Fm">Fm</option>
<option value="Gm">Gm</option>
<option value="Am">Am</option>
<option value="Bm">Bm</option>
</optgroup>

<optgroup label="Accords Majeurs ♯ / ♭">
<option value="A#">Bb / A#</option>
<option value="C#">Db / C#</option>
<option value="D#">Eb / D#</option>
<option value="F#">Gb / F#</option>
<option value="G#">Ab / G#</option>
</optgroup>



<optgroup label="Accords Mineurs ♯ / ♭">
<option value="C#m">Dbm / C#m</option>
<option value="D#m">Ebm / D#m</option>
<option value="F#m">Gbm / F#m</option>
<option value="G#m">Abm / G#m</option>
<option value="A#m">Bbm / A#m</option>
</optgroup>

<optgroup label="Accords Majeurs 7">
<option value="C7">C7</option>
<option value="D7">D7</option>
<option value="E7">E7</option>
<option value="F7">F7</option>
<option value="G7">G7</option>
<option value="A7">A7</option>
<option value="B7">B7</option>
</optgroup>

<optgroup label="Accords Mineurs 7">
<option value="Cm7">Cm7</option>
<option value="Dm7">Dm7</option>
<option value="Em7">Em7</option>
<option value="Fm7">Fm7</option>
<option value="Gm7">Gm7</option>
<option value="Am7">Am7</option>
<option value="Bm7">Bm7</option>
</optgroup>

<optgroup label="Accords 7 (♯ / ♭)">
  <option value="A#7">Bb7 / A#7</option>
  <option value="C#7">Db7 / C#7</option>
  <option value="D#7">Eb7 / D#7</option>
  <option value="F#7">Gb7 / F#7</option>
  <option value="G#7">Ab7 / G#7</option>
</optgroup>



<optgroup label="Accords mineurs 7 (♯ / ♭)">
  <option value="A#m7">Bbm7 / A#m7</option>
  <option value="C#m7">Dbm7 / C#m7</option>
  <option value="D#m7">Ebm7 / D#m7</option>
  <option value="F#m7">Gbm7 / F#m7</option>
  <option value="G#m7">Abm7 / G#m7</option>
</optgroup>


</select>

<select id="position"></select>
</div>

<div class="fretboard-wrapper">
  <div class="fretboard" id="fretboard"></div>
</div>
</div>


/* ================== VOICINGS COMPLETS ================== */
/* (reprend ta logique expert — plusieurs positions) */

<script src="data/voicings.js"></script>

<script>
/* ================== MANCHE ================== */
const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const cls={C:"c","C#":"cs",D:"d","D#":"ds",E:"e",F:"f","F#":"fs",G:"g","G#":"gs",A:"a","A#":"as",B:"b"};
const tuning=[40,45,50,55,59,64];

let html='<div></div>';
for(let s=5;s>=0;s--){
  const n=notes[tuning[s]%12];
  html+=`<div class="cell nut"><div class="note ${cls[n]}" data-s="${s}" data-f="0">${n}</div></div>`;
}
for(let f=1;f<=12;f++){
  html+=`<div class="fret-number">${f}</div>`;
  for(let s=5;s>=0;s--){
    const n=notes[(tuning[s]+f)%12];
    html+=`<div class="cell fret-row"><div class="note ${cls[n]}" data-s="${s}" data-f="${f}">${n}</div></div>`;
  }
}
document.getElementById("fretboard").innerHTML=html;
const allNotes=[...document.querySelectorAll(".note")];

/* ================== LOGIQUE ================== */
const chordSel=document.getElementById("chord");
const posSel=document.getElementById("position");

function render(){
  allNotes.forEach(n=>n.classList.remove("active","root"));
  const v=voicings[chordSel.value];
  if(!v) return;
  const p=v[posSel.value];
  if(!p) return;
  p.f.forEach(n=>{
    const el=document.querySelector(`.note[data-s="${n.s-1}"][data-f="${n.f}"]`);
    if(el){
      el.classList.add("active");
      if(n.r) el.classList.add("root");
    }
  });
}


chordSel.addEventListener('change', () => {
  posSel.innerHTML = '';
  const v = voicings[chordSel.value];
  if (!v) return;

  v.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = p.name;
    posSel.appendChild(opt);
  });

  posSel.selectedIndex = 0;
  render();
});

posSel.addEventListener('change', render);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">

  <!-- La nouvelle balise viewport optimisée -->
  <meta name="viewport" content="width=device-width, initial-scale=0.95">

  <title>Visualiseur d'Accords</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- ... le reste de votre head reste identique ... -->
  <meta name="theme-color" content="#333333"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Accords">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker enregistré avec succès: ', registration.scope);
        }, err => {
          console.log('Échec de l\'enregistrement du ServiceWorker: ', err);
        });
      });
    }
  </script>
</head>

<body>
  <div class="container">
    <h1>Accords guitare</h1>

    <div class="controls">
      <select id="chord">
        <option value="all-notes">Toutes les notes</option> <!-- NOUVELLE LIGNE -->
        <option value="">— Accord —</option>

      </select>

      <select id="position"></select>
    </div>
    <div class="fretboard-wrapper">
      <div class="fretboard" id="fretboard"></div>
    </div>
  </div>

  <!-- ================================================== -->
  <!--                SCRIPTS JAVASCRIPT                -->
  <!-- L'ordre est crucial : d'abord les données, puis la logique. -->
  <!-- ================================================== -->

  <!-- 1. CHARGEMENT DES DONNÉES -->
  <script src="data/voicings.js"></script>

  <!-- 2. CHARGEMENT DE LA LOGIQUE DE L'APPLICATION -->
  <script src="js/app.js"></script>
</body>

</html>

<title>Visualiseur d'Accords (Expert Mobile)</title>

<style>
/* ================== GLOBAL ================== */
body {
  margin: 0;
  padding: 1rem;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f4f4f9;
}

.container {
  max-width: 100%;
  background:#fff;
  padding:1rem;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.1);
}

h1 {
  text-align:center;
  font-size:1.2rem;
  margin-bottom:1rem;
}

/* ================== CONTROLES ================== */
.controls {
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:1rem;
}

select {
  width:100%;
  padding:10px;
  font-size:16px; /* empêche zoom iOS */
}

/* ================== MANCHE ================== */
.fretboard-wrapper {
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

.fretboard {
  display:grid;
  grid-template-columns:32px repeat(6,48px);
  gap:6px;
}

.cell {
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret-number {
  font-size:0.75em;
  color:#777;
}

.fret-row { border-bottom:2px solid #999; }
.nut { border-bottom:4px solid #333; }

/* ================== NOTES ================== */
.note {
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:0.7em;
  opacity:.15;
  transform:scale(.85);
  transition:.2s;
}

.note.active { opacity:1; transform:scale(1); }
.note.root { border:2px solid #fff; transform:scale(1.15); }

/* Couleurs */
.c{background:#e74c3c;} .cs{background:#f5b7b1;}
.d{background:#e67e22;} .ds{background:#f5cba7;}
.e{background:#f1c40f;}
.f{background:#27ae60;} .fs{background:#abebc6;}
.g{background:#3498db;} .gs{background:#aed6f1;}
.a{background:#8e44ad;} .as{background:#d7bde2;}
.b{background:#7f8c8d;}
</style>

<link rel="manifest" href="manifest.json">

<!-- Script pour enregistrer le Service Worker -->
<script>
  if ('serviceWorker' in navigator) {

/* ================== MANCHE ================== */
const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const cls={C:"c","C#":"cs",D:"d","D#":"ds",E:"e",F:"f","F#":"fs",G:"g","G#":"gs",A:"a","A#":"as",B:"b"};
const tuning=[40,45,50,55,59,64];

let html='<div></div>';
for(let s=5;s>=0;s--){
  const n=notes[tuning[s]%12];
  html+=`<div class="cell nut"><div class="note ${cls[n]}" data-s="${s}" data-f="0">${n}</div></div>`;
}
for(let f=1;f<=12;f++){
  html+=`<div class="fret-number">${f}</div>`;
  for(let s=5;s>=0;s--){
    const n=notes[(tuning[s]+f)%12];
    html+=`<div class="cell fret-row"><div class="note ${cls[n]}" data-s="${s}" data-f="${f}">${n}</div></div>`;
  }
}
document.getElementById("fretboard").innerHTML=html;
const allNotes=[...document.querySelectorAll(".note")];

/* ================== LOGIQUE ================== */
const chordSel=document.getElementById("chord");
const posSel=document.getElementById("position");

function render(){
  allNotes.forEach(n=>n.classList.remove("active","root"));
  const v=voicings[chordSel.value];
  if(!v) return;
  const p=v[posSel.value];
  if(!p) return;
  p.f.forEach(n=>{
    const el=document.querySelector(`.note[data-s="${n.s-1}"][data-f="${n.f}"]`);
    if(el){
      el.classList.add("active");
      if(n.r) el.classList.add("root");
    }
  });
}


chordSel.addEventListener('change', () => {
  posSel.innerHTML = '';
  const v = voicings[chordSel.value];
  if (!v) return;

  v.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = p.name;
    posSel.appendChild(opt);
  });

  posSel.selectedIndex = 0;
  render();
});

posSel.addEventListener('change', render);

</script>
